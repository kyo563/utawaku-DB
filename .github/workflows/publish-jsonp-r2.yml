name: publish-jsonp-r2

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "scripts/export-jsonp.mjs"
      - "gas/Code.gs"
      - "gas/Code.deploy.gs"
      - ".github/workflows/publish-jsonp-r2.yml"

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GAS_WEB_APP_URL: ${{ secrets.GAS_WEB_APP_URL }}
      CF_R2_ACCOUNT_ID: ${{ secrets.CF_R2_ACCOUNT_ID }}
      CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch spreadsheet export JSON
        run: |
          test -n "$GAS_WEB_APP_URL"
          mkdir -p tmp
          curl -fsSL "${GAS_WEB_APP_URL}?mode=exportContractV1" -o tmp/spreadsheet-export.json

      - name: Generate JSONP assets
        run: |
          node scripts/export-jsonp.mjs --input tmp/spreadsheet-export.json --out public-data --chunk-size 1000

      - name: Upload JSONP to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          test -n "$CF_R2_ACCOUNT_ID"
          test -n "$CF_R2_BUCKET"
          ENDPOINT="https://${CF_R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          aws s3 cp public-data/songs.js s3://${CF_R2_BUCKET}/public-data/songs.js --endpoint-url "$ENDPOINT"
          aws s3 cp public-data/archive-manifest.js s3://${CF_R2_BUCKET}/public-data/archive-manifest.js --endpoint-url "$ENDPOINT"
          aws s3 cp public-data/validation-warnings.json s3://${CF_R2_BUCKET}/public-data/validation-warnings.json --endpoint-url "$ENDPOINT"
          aws s3 sync public-data/archive-chunks s3://${CF_R2_BUCKET}/public-data/archive-chunks --endpoint-url "$ENDPOINT" --exclude "*" --include "*.js"
