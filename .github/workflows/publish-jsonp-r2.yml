name: サーバーアップロード

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: ["main"]
    paths:
      - "scripts/export-jsonp.mjs"
      - "gas/Code.gs"
      - "gas/Code.deploy.gs"
      - "src/data-source.js"
      - ".github/workflows/publish-jsonp-r2.yml"

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GAS_WEB_APP_URL: ${{ secrets.GAS_WEB_APP_URL }}
      CF_R2_ENDPOINT: ${{ secrets.CF_R2_ENDPOINT }}
      CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch songs export JSON
        run: |
          test -n "$GAS_WEB_APP_URL"
          mkdir -p tmp
          songs_status=$(curl -sS -L -w "%{http_code}" -o tmp/export-songs.json "${GAS_WEB_APP_URL}?mode=songs")
          echo "$songs_status" > tmp/export-songs.status
          echo "[songs] http status: $songs_status"
          node -e '
          const fs = require("node:fs");
          const body = fs.readFileSync("tmp/export-songs.json", "utf8");
          const preview = body.slice(0, 600).replace(/\s+/g, " ");
          console.log(`[songs] response preview: ${preview}`);
          '
          test "$songs_status" -ge 200
          test "$songs_status" -lt 300

      - name: Fetch archive export JSON
        run: |
          test -n "$GAS_WEB_APP_URL"
          mkdir -p tmp
          archive_status=$(curl -sS -L -w "%{http_code}" -o tmp/export-archive.json "${GAS_WEB_APP_URL}?mode=archive")
          echo "$archive_status" > tmp/export-archive.status
          echo "[archive] http status: $archive_status"
          node -e '
          const fs = require("node:fs");
          const body = fs.readFileSync("tmp/export-archive.json", "utf8");
          const preview = body.slice(0, 600).replace(/\s+/g, " ");
          console.log(`[archive] response preview: ${preview}`);
          '
          test "$archive_status" -ge 200
          test "$archive_status" -lt 300

      - name: Validate export payload structure
        run: |
          node -e '
          const fs = require("node:fs");
          function keys(v){ return v && typeof v === "object" && !Array.isArray(v) ? Object.keys(v) : []; }
          function inspect(label, path){
            const src = JSON.parse(fs.readFileSync(path, "utf8"));
            const top = keys(src);
            const data = keys(src.data);
            const sheets = keys((src && src.sheets) || (src.data && src.data.sheets));
            const mode = String((src && src.mode) || "");
            const error = String((src && src.error) || "");
            console.log(`[${label}] top-level keys: ${top.join(",") || "-"}`);
            console.log(`[${label}] data keys: ${data.join(",") || "-"}`);
            console.log(`[${label}] sheets keys: ${sheets.join(",") || "-"}`);
            console.log(`[${label}] mode: ${mode || "-"}`);
            console.log(`[${label}] error: ${error || "-"}`);
            if (!((src && src.sheets) || (src.data && src.data.sheets))) {
              throw new Error(`[${label}] invalid payload: sheets not found, mode=${mode || "-"}, error=${error || "-"}`);
            }
          }
          inspect("songs", "tmp/export-songs.json");
          inspect("archive", "tmp/export-archive.json");
          '

      - name: Generate JSON + JSONP assets
        run: |
          node scripts/export-jsonp.mjs --input-songs tmp/export-songs.json --input-archive tmp/export-archive.json --out public-data --chunk-size 1000

      - name: Upload static assets to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          test -n "$CF_R2_ENDPOINT"
          test -n "$CF_R2_BUCKET"
          aws s3 cp public-data/songs.json s3://${CF_R2_BUCKET}/public-data/songs.json --endpoint-url "$CF_R2_ENDPOINT"
          aws s3 cp public-data/archive/index.json s3://${CF_R2_BUCKET}/public-data/archive/index.json --endpoint-url "$CF_R2_ENDPOINT"
          aws s3 cp public-data/validation-warnings.json s3://${CF_R2_BUCKET}/public-data/validation-warnings.json --endpoint-url "$CF_R2_ENDPOINT"
          aws s3 sync public-data/archive/chunks s3://${CF_R2_BUCKET}/public-data/archive/chunks --endpoint-url "$CF_R2_ENDPOINT" --exclude "*" --include "*.json"

          # 互換維持（移行期間）
          aws s3 cp public-data/songs.js s3://${CF_R2_BUCKET}/public-data/songs.js --endpoint-url "$CF_R2_ENDPOINT"
          aws s3 cp public-data/archive-manifest.js s3://${CF_R2_BUCKET}/public-data/archive-manifest.js --endpoint-url "$CF_R2_ENDPOINT"
          aws s3 sync public-data/archive-chunks s3://${CF_R2_BUCKET}/public-data/archive-chunks --endpoint-url "$CF_R2_ENDPOINT" --exclude "*" --include "*.js"
