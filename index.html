<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Utawaku-DB</title>
    <meta name="description" content="歌枠の履歴を検索し、配信導線へすぐ移動できる静的DB" />
    <meta name="utawaku:data-songs" content="./public-data/songs.json" />
    <meta name="utawaku:data-archive" content="./public-data/archive.json" />
    <meta name="utawaku:data-archive-index" content="./public-data/archive/index.json" />
    <meta name="utawaku:data-meta" content="./public-data/meta.json" />
    <meta name="utawaku:gas-endpoint" content="" />
    <meta name="utawaku:allow-gas-fallback" content="false" />
    <style>
      :root {
        --bg: #f7f8fa;
        --panel: #ffffff;
        --text: #1c2430;
        --sub: #5f6b7a;
        --line: #d9e0ea;
        --accent: #2563eb;
        --focus: color-mix(in srgb, var(--accent) 70%, #ffffff 30%);
        --error: #c62828;
        --ok: #176639;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --radius-2: 10px;
        --radius-3: 14px;
        --control-h: 36px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background: var(--bg);
      }
      .app-shell {
        max-width: 980px;
        margin: 0 auto;
        min-height: 100dvh;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }
      .top-menu {
        position: sticky;
        top: 0;
        z-index: 20;
        background: var(--bg);
        padding: var(--space-3);
        border-bottom: 1px solid var(--line);
      }
      .top-card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius-3);
        padding: var(--space-3);
      }
      .top-card.is-collapsed { padding-bottom: var(--space-2); }
      .top-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-2);
      }
      .status-bar {
        min-width: 0;
        display: grid;
        gap: 2px;
      }
      .status-title {
        margin: 0;
        font-size: 1.02rem;
      }
      .status-meta {
        margin: 0;
        color: var(--sub);
        font-size: 0.82rem;
      }
      #status[data-state="error"] { color: var(--error); }
      .icon-button,
      .button {
        border: 1px solid var(--line);
        border-radius: var(--radius-2);
        background: var(--panel);
        color: var(--text);
        cursor: pointer;
      }
      .icon-button {
        border: 0;
        min-width: 32px;
        min-height: 32px;
        padding: 0;
        font-size: 1rem;
        color: var(--accent);
      }
      .button {
        height: var(--control-h);
        padding: 0 12px;
      }
      .icon-button:focus-visible,
      .button:focus-visible,
      .control:focus-visible,
      .filter-kind input:focus-visible + span {
        outline: 2px solid var(--focus);
        outline-offset: 1px;
      }
      .top-row2 {
        margin-top: var(--space-2);
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: var(--space-2);
        align-items: center;
      }
      .filter-kind {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .filter-kind label {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 0.86rem;
        color: var(--text);
      }
      .filter-kind input { accent-color: var(--accent); }
      .control {
        height: var(--control-h);
        border: 1px solid var(--line);
        border-radius: var(--radius-2);
        background: var(--panel);
        color: var(--text);
        padding: 0 10px;
      }
      .button.sort,
      .button.order {
        background: color-mix(in srgb, var(--accent) 10%, #fff 90%);
        border-color: color-mix(in srgb, var(--accent) 35%, var(--line) 65%);
        font-size: 0.86rem;
      }
      .card-area {
        overflow-y: auto;
        padding: var(--space-3);
        padding-bottom: 120px;
      }
      .card-list { list-style: none; margin: 0; padding: 0; display: grid; gap: var(--space-2); }
      .song-card,
      .state-card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius-3);
        padding: var(--space-3);
      }
      .song-card__title { margin: 0; font-size: 1rem; font-weight: 700; word-break: break-word; }
      .song-card__artist,
      .song-card__meta { margin: 6px 0 0; color: var(--sub); font-size: 0.9rem; }
      .song-card__actions { margin-top: var(--space-2); }
      .card-link {
        display: inline-flex; align-items: center; justify-content: center;
        min-height: 34px; padding: 0 10px;
        border: 1px solid var(--line); border-radius: 8px;
        text-decoration: none; color: var(--text);
      }
      .card-link.is-disabled { opacity: 0.6; }
      .bottom-menu {
        position: sticky;
        bottom: 0;
        z-index: 20;
        padding: var(--space-3);
        border-top: 1px solid var(--line);
        background: var(--bg);
      }
      .bottom-menu__search,
      .bottom-menu__danmaku { display: grid; grid-template-columns: 1fr auto; gap: var(--space-2); }
      .bottom-menu__danmaku { margin-top: var(--space-2); }
      .copy-status { margin: 8px 0 0; min-height: 1.2em; color: var(--sub); font-size: 0.85rem; }
      .copy-status[data-state="ok"] { color: var(--ok); }
      .copy-status[data-state="error"] { color: var(--error); }
      [hidden] { display: none !important; }
      @media (max-width: 720px) {
        .top-row2 {
          grid-template-columns: minmax(0, 1fr) auto auto;
          font-size: 0.8rem;
          gap: 6px;
        }
        .filter-kind label,
        .button.sort,
        .button.order {
          font-size: 0.75rem;
        }
        .button.sort,
        .button.order {
          padding: 0 8px;
          white-space: nowrap;
        }
        .bottom-menu__search,
        .bottom-menu__danmaku { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="top-menu" aria-label="絞り込みメニュー">
        <div id="topCard" class="top-card">
          <div class="top-row">
            <div class="status-bar">
              <h1 id="appTitle" class="status-title">Utawaku-DB</h1>
              <p id="status" class="status-meta" data-state="ready" aria-live="polite">R2状態: 待機中</p>
              <p id="countInfo" class="status-meta">表示 0件 / 全0件</p>
            </div>
            <button id="toggleTopMenu" class="icon-button" type="button" aria-expanded="true" aria-controls="topRow2" aria-label="上部メニューを折りたたむ">▴</button>
          </div>
          <div id="topRow2" class="top-row2">
            <fieldset id="kindFilters" class="filter-kind control" aria-label="種別絞り込み">
              <label><input type="checkbox" value="歌枠" checked /><span>歌枠</span></label>
              <label><input type="checkbox" value="歌ってみた" checked /><span>歌ってみた</span></label>
              <label><input type="checkbox" value="ショート" checked /><span>ショート</span></label>
            </fieldset>
            <button id="sortToggle" class="button sort" type="button">投稿日順</button>
            <button id="orderToggle" class="button order" type="button">降順</button>
          </div>
        </div>
      </header>

      <section class="card-area" aria-label="情報カード一覧">
        <ul id="resultList" class="card-list"></ul>
      </section>

      <footer class="bottom-menu" aria-label="検索と弾幕メニュー">
        <div class="bottom-menu__search">
          <input id="qInput" class="control" type="search" placeholder="曲名 / アーティスト名で検索" />
          <button id="clearSearch" class="button" type="button">クリア</button>
        </div>
        <div class="bottom-menu__danmaku">
          <select id="danmakuType" class="control" aria-label="弾幕プリセット"></select>
          <button id="copyDanmaku" class="button" type="button">弾幕をコピー</button>
        </div>
        <p id="copyStatus" class="copy-status" data-state="idle" aria-live="polite"></p>
      </footer>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
