<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Utawaku-DB</title>
    <meta name="description" content="歌枠の履歴を検索し、配信導線へすぐ移動できる静的DB" />
    <meta name="utawaku:data-songs" content="./public-data/songs.json" />
    <meta name="utawaku:data-archive" content="./public-data/archive.json" />
    <meta name="utawaku:data-meta" content="./public-data/meta.json" />
    <meta name="utawaku:gas-endpoint" content="" />
    <style>
      :root {
        --bg: #f7f8fa;
        --panel: #ffffff;
        --text: #1c2430;
        --sub: #5f6b7a;
        --line: #d9e0ea;
        --focus: #2563eb;
        --error: #c62828;
        --ok: #176639;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --radius-2: 10px;
        --radius-3: 14px;
        --control-h: 40px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background: var(--bg);
      }
      .app-shell {
        max-width: 980px;
        margin: 0 auto;
        min-height: 100dvh;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }
      .top-menu {
        position: sticky;
        top: 0;
        z-index: 20;
        background: var(--bg);
        padding: var(--space-3);
        border-bottom: 1px solid var(--line);
      }
      .top-menu__head {
        margin-bottom: var(--space-2);
      }
      .top-menu__title {
        margin: 0;
        font-size: 1.1rem;
      }
      .top-menu__desc {
        margin: 4px 0 0;
        color: var(--sub);
        font-size: 0.9rem;
      }
      .top-menu__controls {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: var(--space-2);
      }
      .control,
      .button {
        height: var(--control-h);
        border: 1px solid var(--line);
        border-radius: var(--radius-2);
        background: var(--panel);
        color: var(--text);
        padding: 0 10px;
      }
      .button {
        cursor: pointer;
      }
      .control:focus,
      .button:focus {
        outline: 2px solid var(--focus);
        outline-offset: 1px;
      }
      .top-menu__meta {
        margin-top: var(--space-2);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: var(--space-2);
        font-size: 0.88rem;
        color: var(--sub);
      }
      #status[data-state="error"] {
        color: var(--error);
      }
      .card-area {
        overflow-y: auto;
        padding: var(--space-3);
        padding-bottom: 120px;
      }
      .card-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: var(--space-2);
      }
      .song-card,
      .state-card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius-3);
        padding: var(--space-3);
      }
      .song-card__title {
        margin: 0;
        font-size: 1rem;
        font-weight: 700;
        word-break: break-word;
      }
      .song-card__artist,
      .song-card__meta {
        margin: 6px 0 0;
        color: var(--sub);
        font-size: 0.9rem;
      }
      .song-card__actions {
        margin-top: var(--space-2);
      }
      .card-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 34px;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        text-decoration: none;
        color: var(--text);
      }
      .card-link.is-disabled {
        opacity: 0.6;
      }
      .bottom-menu {
        position: sticky;
        bottom: 0;
        z-index: 20;
        padding: var(--space-3);
        border-top: 1px solid var(--line);
        background: var(--bg);
      }
      .bottom-menu__search,
      .bottom-menu__danmaku {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: var(--space-2);
      }
      .bottom-menu__danmaku {
        margin-top: var(--space-2);
      }
      .copy-status {
        margin: 8px 0 0;
        min-height: 1.2em;
        color: var(--sub);
        font-size: 0.85rem;
      }
      .copy-status[data-state="ok"] {
        color: var(--ok);
      }
      .copy-status[data-state="error"] {
        color: var(--error);
      }
      @media (max-width: 720px) {
        .top-menu__controls {
          grid-template-columns: 1fr;
        }
        .bottom-menu__search,
        .bottom-menu__danmaku {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="top-menu" aria-label="絞り込みメニュー">
        <div class="top-menu__head">
          <h1 id="appTitle" class="top-menu__title">Utawaku-DB</h1>
          <p id="appDescription" class="top-menu__desc">歌枠履歴を今すぐ使える形で検索します。</p>
        </div>
        <div class="top-menu__controls">
          <select id="kindFilter" class="control" aria-label="区分フィルタ"></select>
          <select id="sortSelect" class="control" aria-label="並び順"></select>
          <button id="resetFilters" class="button" type="button">絞り込み解除</button>
          <button id="reloadButton" class="button" type="button">再読込</button>
        </div>
        <div class="top-menu__meta">
          <span id="countInfo">0件 / 全0件</span>
          <span id="status" data-state="ready" aria-live="polite">待機中</span>
        </div>
      </header>

      <section class="card-area" aria-label="情報カード一覧">
        <ul id="resultList" class="card-list"></ul>
      </section>

      <footer class="bottom-menu" aria-label="検索と弾幕メニュー">
        <div class="bottom-menu__search">
          <input id="qInput" class="control" type="search" placeholder="曲名 / アーティスト名で検索" />
          <button id="clearSearch" class="button" type="button">クリア</button>
        </div>
        <div class="bottom-menu__danmaku">
          <select id="danmakuType" class="control" aria-label="弾幕プリセット"></select>
          <button id="copyDanmaku" class="button" type="button">弾幕をコピー</button>
        </div>
        <p id="copyStatus" class="copy-status" data-state="idle" aria-live="polite"></p>
      </footer>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
